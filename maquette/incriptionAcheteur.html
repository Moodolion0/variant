<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#19b3e6",
              "background-light": "#f6f7f8",
              "background-dark": "#111d21",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="relative flex h-auto min-h-screen w-full max-w-[480px] mx-auto flex-col bg-white dark:bg-background-dark overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-100 dark:border-gray-800">
<div class="text-[#111618] dark:text-white flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowBack">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Inscription Acheteur</h2>
</div>
<!-- HeadlineText -->
<div class="px-4">
<h2 class="text-[#111618] dark:text-white tracking-light text-[28px] font-bold leading-tight text-left pb-2 pt-8">Créer votre compte</h2>
<!-- BodyText -->
<p class="text-[#637f88] dark:text-gray-400 text-base font-normal leading-normal pb-6">Rejoignez notre communauté d'acheteurs pour profiter de nos meilleures offres.</p>
</div>
<div class="flex flex-col gap-1">
<!-- TextField: Nom complet -->
<div class="flex flex-wrap items-end gap-4 px-4 py-2">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-white text-sm font-medium leading-normal pb-1.5">Nom complet</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal leading-normal" placeholder="Ex: Jean Dupont" type="text" value=""/>
</label>
</div>
<!-- TextField: Email -->
<div class="flex flex-wrap items-end gap-4 px-4 py-2">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-white text-sm font-medium leading-normal pb-1.5">Email</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal leading-normal" placeholder="exemple@email.com" type="email" value=""/>
</label>
</div>
<!-- TextField: Téléphone -->
<div class="flex flex-wrap items-end gap-4 px-4 py-2">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-white text-sm font-medium leading-normal pb-1.5">Numéro de téléphone</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal leading-normal" placeholder="+33 6 12 34 56 78" type="tel" value=""/>
</label>
</div>
<!-- TextField: Mot de passe -->
<div class="flex flex-wrap items-end gap-4 px-4 py-2">
<label class="flex flex-col min-w-40 flex-1 relative">
<p class="text-[#111618] dark:text-white text-sm font-medium leading-normal pb-1.5">Mot de passe</p>
<div class="relative w-full">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#637f88] p-[15px] pr-12 text-base font-normal leading-normal" placeholder="••••••••" type="password" value=""/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-[#637f88] cursor-pointer">visibility</span>
</div>
</label>
</div>
<!-- TextField: Confirmation Mot de passe -->
<div class="flex flex-wrap items-end gap-4 px-4 py-2">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-white text-sm font-medium leading-normal pb-1.5">Confirmer le mot de passe</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal leading-normal" placeholder="••••••••" type="password" value=""/>
</label>
</div>
</div>
<!-- Submit Button -->
<div class="px-4 py-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white text-base font-bold h-14 rounded-xl transition-colors shadow-lg shadow-primary/20">
                Créer mon compte acheteur
            </button>
<div class="mt-6 flex items-center justify-center gap-2">
<span class="text-[#637f88] dark:text-gray-400 text-sm">Déjà un compte ?</span>
<a class="text-primary font-semibold text-sm hover:underline" href="#">Se connecter</a>
</div>
</div>
<!-- Security/TOS Footer -->
<div class="mt-auto px-8 pb-10 text-center">
<p class="text-[#637f88] dark:text-gray-500 text-xs leading-relaxed">
                En créant un compte, vous acceptez nos <a class="underline" href="#">Conditions d'Utilisation</a> et notre <a class="underline" href="#">Politique de Confidentialité</a>.
            </p>
</div>
<div class="h-5 bg-white dark:bg-background-dark"></div>
</div>
</body></html>
