<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ajouter un Fournisseur</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#19b3e6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111d21",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input:focus {
            border-color: #19b3e6 !important;
            box-shadow: 0 0 0 1px #19b3e6 !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="max-w-[480px] mx-auto bg-white dark:bg-background-dark min-h-screen shadow-sm flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center bg-white dark:bg-background-dark p-4 border-b border-gray-100 dark:border-gray-800 sticky top-0 z-10">
<div class="text-[#111618] dark:text-white flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 ml-2">Ajouter un Fournisseur</h2>
<div class="size-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Section Header -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Informations Générales</h3>
</div>
<!-- Nom du fournisseur -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111618] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Nom du fournisseur</p>
<input class="form-input flex w-full rounded-lg text-[#111618] dark:text-white border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal" placeholder="Ex: Logistics Pro" type="text"/>
</label>
</div>
<!-- Adresse email -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111618] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Adresse email</p>
<input class="form-input flex w-full rounded-lg text-[#111618] dark:text-white border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal" placeholder="contact@fournisseur.com" type="email"/>
</label>
</div>
<!-- Téléphone -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111618] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Téléphone</p>
<input class="form-input flex w-full rounded-lg text-[#111618] dark:text-white border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637f88] p-[15px] text-base font-normal" placeholder="+33 6 00 00 00 00" type="tel"/>
</label>
</div>
<div class="h-4"></div>
<!-- Section Localisation -->
<div class="px-4 pt-4 pb-2">
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Localisation</h3>
</div>
<!-- Coordonnées -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111618] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Coordonnées (Latitude, Longitude)</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111618] dark:text-white border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637f88] p-[15px] pr-12 text-base font-normal" placeholder="48.8566, 2.3522" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-primary">my_location</span>
</div>
</label>
</div>
<!-- Map View -->
<div class="px-4 py-3">
<div class="relative w-full aspect-video rounded-xl overflow-hidden border border-[#dce3e5] dark:border-gray-700">
<img class="w-full h-full object-cover" data-alt="A clean top-down map view of a city with a pin marker" data-location="Paris, France" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLdQUYYTSpfZGRfkYDpq8F83Bc45dHSEEZCmkT8gyO8Vdyw64LIoFO9TBKZ5QZkHBBnttm7PyoAQ3vH0XFoz91R6KKYz8hZFZ67CKhFpmLRVFpaz-BFUUD4RqUhH14l0H-fNQbCzsPs7cIzkVnkmmcsky-p3toS8NEjElVPRi6nYJOZ1KtvO-lG4_5rmZnfCpafZl9yYAPu25SXE3ppDuR3NH9YfOSWH2VbN83SOE8kNTV3hLpxMWaAOxvs1o2DXNzePld3YWD-f8"/>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="bg-primary/20 p-4 rounded-full flex items-center justify-center border-2 border-primary">
<span class="material-symbols-outlined text-primary text-3xl fill-1" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
</div>
<div class="absolute bottom-3 right-3 flex flex-col gap-2">
<button class="bg-white dark:bg-gray-800 p-2 rounded-lg shadow-md border border-gray-100 dark:border-gray-700 flex items-center justify-center">
<span class="material-symbols-outlined text-gray-700 dark:text-gray-200">add</span>
</button>
<button class="bg-white dark:bg-gray-800 p-2 rounded-lg shadow-md border border-gray-100 dark:border-gray-700 flex items-center justify-center">
<span class="material-symbols-outlined text-gray-700 dark:text-gray-200">remove</span>
</button>
</div>
</div>
<p class="text-xs text-[#637f88] mt-2 italic px-1">Maintenez et glissez pour ajuster la position sur la carte.</p>
</div>
</main>
<!-- Fixed Footer Action Button -->
<div class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-gray-100 dark:border-gray-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Enregistrer le fournisseur
            </button>
</div>
</div>
</body></html>
