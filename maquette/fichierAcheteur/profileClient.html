<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Mon Profil Client</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#19b3e6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111d21",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .ios-status-bar {
            height: 44px;
        }
        .bottom-nav-blur {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-100 min-h-screen flex flex-col">
<!-- iOS Status Bar Placeholder -->
<div class="ios-status-bar flex justify-between items-center px-6 w-full fixed top-0 bg-background-light dark:bg-background-dark z-50">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center space-x-1.5">
<span class="material-icons text-[14px]">signal_cellular_alt</span>
<span class="material-icons text-[14px]">wifi</span>
<span class="material-icons text-[18px]">battery_full</span>
</div>
</div>
<!-- Top Navigation / Header -->
<header class="pt-12 px-5 pb-4 flex justify-between items-center bg-background-light dark:bg-background-dark">
<h1 class="text-2xl font-bold tracking-tight">Profil</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700">
<span class="material-icons text-slate-600 dark:text-slate-300">notifications_none</span>
</button>
</header>
<!-- Profile Header Section -->
<main class="flex-1 px-5 pb-32">
<div class="flex flex-col items-center py-6">
<div class="relative group">
<img alt="Profile Picture" class="w-24 h-24 rounded-full object-cover border-4 border-white dark:border-slate-800 shadow-md" data-alt="Professional portrait of a male client" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjVrM7YMR2tB_KKhSgWQNB9olIhXVUbyAN_jLbbTlSib2j78qrFWbk4ETQQRZYG6etZIG2NP7vTRwgeNlb8bi34zCLkKnnDZTLkZX8LX4G4V1Bo7jE43H3mbbl-g07HdBxQ6YozCZejB2nPRKoJl31tJHmYXn8xk67n2GKwPZtjR3SPS27_ASftByaFkI1BGBN5XF0DYZFTMi0g6vvodf_ecB1W06R6p6Y58AQFMCl6VDLJja84lt6iBXneCnOhSsC6rLYAtR2uGg"/>
<div class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full shadow-lg">
<span class="material-icons text-[16px]">photo_camera</span>
</div>
</div>
<h2 class="mt-4 text-xl font-bold">Jean Dupont</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">jean.dupont@email.com</p>
</div>
<!-- Settings List -->
<div class="space-y-3">
<div class="bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700">
<!-- Mes Informations -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors border-b border-slate-50 dark:border-slate-700/50">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-icons text-[22px]">person_outline</span>
</div>
<span class="font-medium">Mes Informations</span>
</div>
<span class="material-icons text-slate-400 text-[20px]">chevron_right</span>
</button>
<!-- Mes Adresses -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors border-b border-slate-50 dark:border-slate-700/50">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-icons text-[22px]">map</span>
</div>
<span class="font-medium">Mes Adresses Enregistrées</span>
</div>
<span class="material-icons text-slate-400 text-[20px]">chevron_right</span>
</button>
<!-- Moyens de Paiement -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors border-b border-slate-50 dark:border-slate-700/50">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-icons text-[22px]">credit_card</span>
</div>
<span class="font-medium">Moyens de Paiement</span>
</div>
<span class="material-icons text-slate-400 text-[20px]">chevron_right</span>
</button>
<!-- Notifications -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors border-b border-slate-50 dark:border-slate-700/50">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-icons text-[22px]">notifications_active</span>
</div>
<span class="font-medium">Centre de Notifications</span>
</div>
<div class="flex items-center space-x-2">
<span class="bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">3</span>
<span class="material-icons text-slate-400 text-[20px]">chevron_right</span>
</div>
</button>
<!-- Aide & Support -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-icons text-[22px]">help_outline</span>
</div>
<span class="font-medium">Aide &amp; Support</span>
</div>
<span class="material-icons text-slate-400 text-[20px]">chevron_right</span>
</button>
</div>
<!-- Logout Button -->
<button class="w-full mt-6 bg-white dark:bg-slate-800 flex items-center justify-center space-x-2 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 active:scale-[0.98] transition-all">
<span class="material-icons text-red-500 text-[22px]">logout</span>
<span class="font-bold text-red-500">Déconnexion</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-background-dark/80 bottom-nav-blur border-t border-slate-100 dark:border-slate-800 pb-8 pt-2 px-6">
<div class="flex justify-between items-center">
<!-- Home -->
<button class="flex flex-col items-center space-y-1 text-slate-400">
<span class="material-icons text-[24px]">home</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Accueil</span>
</button>
<!-- Categories -->
<button class="flex flex-col items-center space-y-1 text-slate-400">
<span class="material-icons text-[24px]">grid_view</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Catégories</span>
</button>
<!-- Cart -->
<button class="flex flex-col items-center space-y-1 text-slate-400">
<span class="material-icons text-[24px]">shopping_cart</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Panier</span>
</button>
<!-- Orders -->
<button class="flex flex-col items-center space-y-1 text-slate-400">
<span class="material-icons text-[24px]">local_mall</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Commandes</span>
</button>
<!-- Profile (Active) -->
<button class="flex flex-col items-center space-y-1 text-primary">
<span class="material-icons text-[24px]">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Profil</span>
</button>
</div>
<!-- iPhone Indicator Space -->
<div class="h-4 w-full"></div>
</nav>
</body></html>
