<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Validation de la Commande</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#19b3e6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111d21",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111618] dark:text-white">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[480px] mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-100 dark:border-gray-800 sticky top-0 z-10">
<div class="text-[#111618] dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Validation de la Commande</h2>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto pb-32">
<!-- SectionHeader -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-[#111618] dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">Lieu de livraison</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Sélectionnez où vous souhaitez être livré</p>
</div>
<!-- SegmentedButtons -->
<div class="flex px-4 py-3">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-gray-700 has-[:checked]:shadow-sm has-[:checked]:text-[#111618] dark:has-[:checked]:text-white text-gray-500 dark:text-gray-400 text-sm font-semibold transition-all">
<span class="truncate">Ma position</span>
<input checked="" class="invisible w-0" name="delivery-mode" type="radio" value="gps"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-gray-700 has-[:checked]:shadow-sm has-[:checked]:text-[#111618] dark:has-[:checked]:text-white text-gray-500 dark:text-gray-400 text-sm font-semibold transition-all">
<span class="truncate">Liste des lieux</span>
<input class="invisible w-0" name="delivery-mode" type="radio" value="list"/>
</label>
</div>
</div>
<!-- SingleButton (Current Position State) -->
<div class="flex px-4 py-3">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-4 bg-primary text-white gap-3 shadow-md active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">my_location</span>
<span class="truncate font-bold text-base tracking-wide">Utiliser ma position actuelle</span>
</button>
</div>
<!-- Map Mockup (Visual cue for GPS) -->
<div class="px-4 mb-4">
<div class="w-full h-32 rounded-xl bg-gray-200 dark:bg-gray-800 relative overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-4xl">map</span>
</div>
<img class="w-full h-full object-cover opacity-60" data-alt="Carte minimaliste de la ville locale" data-location="Paris, France" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwRVw94QPa5orsJwwariVkqVdeh6SPO8o2lcL3fCizOFIpsuJelVZsX1THrqCM_zDCMdAUnlAsQVjVvAIV8yhelpZbtZppdvlnliSLqM5rd7QAUI04mTsuvocnLterEwjyje_KKtVA7_mxbikCQyQPMSC6-H3rDPaW_k10ALa-AQmIRmuD_QIphtpD49tgogeYZWLi4ohuH2VR-OPunUXRQnCBhI0QUu_zgVVQWZSnWfjGz-enaIhntUGjDcUH_o4dguFe5rRL8dE"/>
</div>
</div>
<div class="h-[1px] bg-gray-100 dark:border-gray-800 mx-4 my-4"></div>
<!-- TextField (Predefined Locations) -->
<div class="flex flex-col gap-2 px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111618] dark:text-white text-base font-semibold pb-2">Zones de livraison enregistrées</p>
<div class="relative">
<select class="form-input flex w-full appearance-none rounded-xl text-[#111618] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-200 dark:border-gray-700 bg-white dark:bg-background-dark h-14 px-4 pr-10 text-base font-normal leading-normal">
<option value="none">Choisir un point de retrait / zone</option>
<option value="center">Centre Ville - Zone A</option>
<option value="north">Quartier Nord - Zone B</option>
<option value="campus">Campus Universitaire</option>
<option value="station">Gare Centrale</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</label>
</div>
<!-- SectionHeader: Summary -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Récapitulatif</h3>
</div>
<!-- Summary Card -->
<div class="mx-4 p-4 bg-background-light dark:bg-gray-800/50 rounded-2xl space-y-3">
<div class="flex justify-between items-center text-sm">
<span class="text-gray-500 dark:text-gray-400">Sous-total (3 articles)</span>
<span class="font-medium">124,50 €</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-gray-500 dark:text-gray-400">Frais de livraison</span>
<span class="font-medium text-primary">+ 5,00 €</span>
</div>
<div class="h-[1px] bg-gray-200 dark:bg-gray-700 my-1"></div>
<div class="flex justify-between items-center pt-1">
<span class="text-[#111618] dark:text-white font-bold text-lg">Total à payer</span>
<span class="text-primary font-bold text-xl">129,50 €</span>
</div>
</div>
</div>
<!-- Floating Bottom Actions -->
<div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-gray-100 dark:border-gray-800 pb-8 px-4 pt-4 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-primary text-white font-bold text-lg shadow-lg active:scale-[0.98] transition-all">
<span>Confirmer et Payer</span>
</button>
<!-- Bottom Navigation Mockup -->
<div class="flex justify-around items-center pt-6 opacity-80">
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px]">Accueil</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
<span class="text-[10px]">Panier</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px]">Commandes</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px]">Profil</span>
</div>
</div>
</div>
</div>
</body></html>
